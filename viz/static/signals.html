<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tanker Flow — Market signals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/signals.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
</head>
<body class="signals-page">
  <header id="signals-header">
    <a href="/" id="nav-map">&larr;&nbsp;Map</a>
    <div class="title-block">
      <h1>Market&nbsp;signals</h1>
      <span class="subtitle">LNG carrier positions &rarr; Henry&nbsp;Hub&nbsp;/&nbsp;TTF spread</span>
    </div>
    <label id="regime-toggle"><input type="checkbox" id="split-regime"> split by ingest regime</label>
    <span id="signals-status">Loading…</span>
  </header>

  <!-- Pipeline status strip: what's flowing through the pipeline right now -->
  <div id="status-strip">
    <div class="stat"><span class="stat-label">signals rebuilt</span><span class="stat-val" id="st-rebuilt">—</span></div>
    <div class="stat"><span class="stat-label">panel</span><span class="stat-val" id="st-panel">—</span></div>
    <div class="stat"><span class="stat-label">legs in transit</span><span class="stat-val" id="st-transit">—</span></div>
    <div class="stat"><span class="stat-label">est. destination</span><span class="stat-val" id="st-fallback">—</span></div>
    <div class="stat"><span class="stat-label">regime now</span><span class="stat-val" id="st-regime">—</span></div>
    <div class="stat"><span class="stat-label">port events rebuilt</span><span class="stat-val" id="st-pe">—</span></div>
  </div>

  <main id="signal-sections"></main>

  <!-- Contributor drawer: the legs/events behind a clicked value -->
  <div id="drawer-scrim"></div>
  <aside id="contrib-drawer">
    <div class="drawer-head">
      <div>
        <div class="drawer-title" id="drawer-title">—</div>
        <div class="drawer-sub" id="drawer-sub"></div>
      </div>
      <button id="drawer-close" title="Close">&times;</button>
    </div>
    <div id="drawer-body"></div>
  </aside>

  <script type="module" src="/static/js/signals.js"></script>
</body>
</html>
