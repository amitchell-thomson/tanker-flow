<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tanker Flow</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    :root { --panel-w: 360px; }
    body { margin: 0; background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #ecf0f1; }
    #layout { display: flex; height: 100vh; width: 100vw; }
    #map { flex: 1; height: 100vh; }
    #events-panel {
      width: var(--panel-w);
      height: 100vh;
      background: #1f2733;
      border-left: 1px solid #2c3e50;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }
    #events-count, #fixes-count { color: #7f8c8d; font-weight: normal; font-size: 12px; margin-left: auto; }
    /* Tab bar switching the panel between Port events and Recent fixes */
    #panel-tabs { display: flex; border-bottom: 1px solid #2c3e50; }
    .tab-btn {
      flex: 1;
      padding: 10px 12px;
      background: #1f2733;
      color: #7f8c8d;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
    }
    .tab-btn:hover { background: #29333f; color: #bdc3c7; }
    .tab-btn.active { color: #3498db; border-bottom-color: #3498db; }
    .panel-view { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    #events-filters {
      padding: 8px 12px;
      border-bottom: 1px solid #2c3e50;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    #events-filters select {
      background: #2c3e50;
      color: #ecf0f1;
      border: 1px solid #3a4a5a;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 12px;
    }
    #events-list, #fixes-list { flex: 1; overflow-y: auto; }
    /* Recent-fixes feed rows */
    #fixes-filters {
      padding: 8px 12px;
      border-bottom: 1px solid #2c3e50;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #fixes-filters select {
      background: #2c3e50;
      color: #ecf0f1;
      border: 1px solid #3a4a5a;
      border-radius: 3px;
      padding: 3px 6px;
      font-size: 12px;
    }
    #fixes-filters label { font-size: 12px; color: #95a5a6; display: flex; align-items: center; gap: 4px; }
    .fix-row {
      padding: 7px 12px;
      border-bottom: 1px solid #2a3340;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .fix-row:hover { background: #29333f; }
    .fix-row.fresh { border-left: 3px solid #2ecc71; padding-left: 9px; }
    .fix-row-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .fix-vessel { font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fix-age { color: #7f8c8d; font-size: 11px; font-family: monospace; white-space: nowrap; }
    .fix-row-bottom { display: flex; gap: 6px; align-items: center; font-size: 11px; color: #95a5a6; font-family: monospace; }
    /* Vessel-class + tier chips, shared by the fixes feed */
    .chip { padding: 1px 5px; border-radius: 2px; font-size: 10px; font-weight: 600; }
    .chip-fsru    { background: #e74c3c; color: white; }
    .chip-carrier { background: #ff5fa2; color: white; }
    .chip-unknown { background: #34495e; color: #95a5a6; }
    .tier { padding: 1px 5px; border-radius: 2px; font-size: 10px; font-weight: 700; color: #11161c; }
    .tier-1 { background: #2ecc71; }
    .tier-2 { background: #f1c40f; }
    .tier-3 { background: #e67e22; }
    .tier-4 { background: #95a5a6; }
    .tier-5 { background: #566573; color: #ecf0f1; }
    .event-row {
      padding: 8px 12px;
      border-bottom: 1px solid #2a3340;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .event-row:hover { background: #29333f; }
    .event-row.selected { background: #2d3e50; border-left: 3px solid #3498db; padding-left: 9px; }
    .event-row-top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .event-vessel { font-weight: 600; color: #ecf0f1; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event-time { color: #7f8c8d; font-size: 11px; font-family: monospace; white-space: nowrap; }
    .event-row-bottom { display: flex; gap: 6px; align-items: center; font-size: 12px; }
    .event-pill { padding: 1px 6px; border-radius: 3px; font-size: 11px; font-family: monospace; }
    .event-terminal { color: #95a5a6; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge { padding: 1px 5px; border-radius: 2px; font-size: 10px; font-weight: 600; }
    .badge-laden { background: #16a085; color: white; }
    .badge-ballast { background: #34495e; color: #95a5a6; }
    .badge-cold { background: #e67e22; color: white; }
    .badge-fsru { background: #e74c3c; color: white; }
    /* Floating HUD surfaces — translucent dark cards that read as one system */
    .hud {
      position: absolute;
      z-index: 1000;
      background: rgba(20, 26, 34, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #reset-btn {
      display: none;
      top: 12px;
      right: calc(var(--panel-w) + 12px);
      padding: 7px 13px;
      color: #ecf0f1;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    #reset-btn:hover { background: rgba(52, 73, 94, 0.6); }
    #layer-controls {
      top: 12px;
      left: 52px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      padding: 5px;
    }
    .layer-btn {
      padding: 5px 10px;
      background: transparent;
      color: #bdc3c7;
      border: 1px solid transparent;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .layer-btn.active { background: rgba(52, 152, 219, 0.18); color: #3498db; }
    .layer-btn:hover:not(.active) { background: rgba(255, 255, 255, 0.06); }
    #status {
      bottom: 12px;
      left: 12px;
      padding: 6px 12px;
      color: #bdc3c7;
      font-size: 11px;
      font-family: monospace;
      max-width: 40vw;
    }
    /* Live ingestion pulse — fix rate + a dot that breathes while data flows */
    #live-hud {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-family: monospace;
      color: #bdc3c7;
    }
    #live-dot { width: 9px; height: 9px; border-radius: 50%; background: #7f8c8d; flex: none; }
    #live-dot.live { background: #2ecc71; animation: live-pulse 1.8s ease-in-out infinite; }
    #live-dot.stale { background: #e74c3c; }
    @keyframes live-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.55); }
      50%      { box-shadow: 0 0 0 6px rgba(46, 204, 113, 0); }
    }
    /* Map legend — decodes the marker encoding (class / tier ring / freshness) */
    #legend {
      bottom: 12px;
      right: calc(var(--panel-w) + 12px);
      padding: 9px 11px;
      font-size: 11px;
      color: #bdc3c7;
      line-height: 1.5;
      width: 150px;
    }
    #legend .legend-title { font-weight: 600; color: #ecf0f1; margin: 7px 0 3px; }
    #legend .legend-title:first-child { margin-top: 0; }
    #legend .legend-row { display: flex; align-items: center; gap: 6px; }
    #legend .swatch { width: 11px; height: 11px; border-radius: 50%; flex: none; }
    #legend .swatch.sq { border-radius: 2px; }
    #legend .tier-scale { display: flex; gap: 3px; margin-top: 2px; }
    #legend .tier-scale span { flex: 1; text-align: center; border-radius: 2px; font-size: 9px; font-weight: 700; color: #11161c; padding: 1px 0; }
    #legend .fade-bar { height: 9px; border-radius: 2px; margin-top: 3px; background: linear-gradient(90deg, #ff5fa2 0%, rgba(255,95,162,0.16) 100%); }
    #legend .fade-labels { display: flex; justify-content: space-between; font-size: 9px; color: #7f8c8d; margin-top: 1px; }
    /* Dark-theme the Leaflet chrome (zoom, attribution, popups, tooltips) */
    .leaflet-control-zoom a {
      background: rgba(20, 26, 34, 0.85); color: #ecf0f1;
      border-color: rgba(255, 255, 255, 0.1);
    }
    .leaflet-control-zoom a:hover { background: rgba(52, 73, 94, 0.9); }
    .leaflet-bar { border: 1px solid rgba(255, 255, 255, 0.1); }
    .leaflet-control-attribution {
      background: rgba(20, 26, 34, 0.7) !important; color: #7f8c8d !important;
    }
    .leaflet-control-attribution a { color: #95a5a6 !important; }
    .leaflet-popup-content-wrapper, .leaflet-popup-tip {
      background: #1f2733; color: #ecf0f1; box-shadow: 0 3px 14px rgba(0, 0, 0, 0.5);
    }
    .leaflet-popup-content { font-size: 12px; }
    .leaflet-container a.leaflet-popup-close-button { color: #95a5a6; }
    .leaflet-tooltip {
      background: #1f2733; color: #ecf0f1; border: 1px solid #2c3e50;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
    }
    .leaflet-tooltip-top::before { border-top-color: #1f2733; }
    .leaflet-tooltip-bottom::before { border-bottom-color: #1f2733; }
    .leaflet-tooltip-left::before { border-left-color: #1f2733; }
    .leaflet-tooltip-right::before { border-right-color: #1f2733; }
    /* Event-type color pills (also used as the map icon colors) */
    .et-zone_entry      { background: #27ae60; color: white; }
    .et-anchorage_entry { background: #2980b9; color: white; }
    .et-anchored        { background: #1a5490; color: white; }
    .et-anchorage_exit  { background: #5dade2; color: white; }
    .et-moored          { background: #e67e22; color: white; }
    .et-departed        { background: #d35400; color: white; }
    .et-zone_exit       { background: #c0392b; color: white; }
  </style>
</head>
<body>
  <div id="layout">
    <div id="map"></div>
    <div id="events-panel">
      <div id="panel-tabs">
        <button class="tab-btn active" id="tab-events" onclick="switchTab('events')">Port events</button>
        <button class="tab-btn"        id="tab-fixes"  onclick="switchTab('fixes')">Recent fixes</button>
      </div>

      <div id="events-view" class="panel-view">
        <div id="events-filters">
          <select id="filter-zone">
            <option value="">All zones</option>
            <option value="usgulf">usgulf</option>
            <option value="usatlantic">usatlantic</option>
            <option value="nweurope">nweurope</option>
            <option value="baltic">baltic</option>
            <option value="iberian">iberian</option>
            <option value="wmed">wmed</option>
            <option value="emed">emed</option>
          </select>
          <select id="filter-event-type">
            <option value="">All types</option>
            <option value="zone_entry">zone_entry</option>
            <option value="anchorage_entry">anchorage_entry</option>
            <option value="anchored">anchored</option>
            <option value="anchorage_exit">anchorage_exit</option>
            <option value="moored">moored</option>
            <option value="departed">departed</option>
            <option value="zone_exit">zone_exit</option>
          </select>
          <select id="filter-since">
            <option value="">All time</option>
            <option value="6">last 6h</option>
            <option value="24" selected>last 24h</option>
            <option value="168">last 7d</option>
          </select>
          <span id="events-count">…</span>
        </div>
        <div id="events-list">Loading…</div>
      </div>

      <div id="fixes-view" class="panel-view" style="display:none;">
        <div id="fixes-filters">
          <select id="filter-fixes-since">
            <option value="0.25">last 15m</option>
            <option value="1" selected>last 1h</option>
            <option value="6">last 6h</option>
            <option value="24">last 24h</option>
          </select>
          <label><input type="checkbox" id="fixes-autorefresh" checked> auto-refresh</label>
          <span id="fixes-count">…</span>
        </div>
        <div id="fixes-list">Loading…</div>
      </div>
    </div>
  </div>
  <div id="live-hud" class="hud">
    <span id="live-dot"></span>
    <span id="live-text">…</span>
  </div>
  <button id="reset-btn" class="hud" onclick="resetView()">Show all vessels</button>
  <div id="layer-controls" class="hud">
    <button class="layer-btn active" id="btn-zones"   onclick="toggleLayer('zones')">Terminal zones</button>
    <button class="layer-btn active" id="btn-boxes"   onclick="toggleLayer('boxes')">AIS boxes</button>
    <button class="layer-btn active" id="btn-vessels" onclick="toggleLayer('vessels')">Vessels</button>
    <button class="layer-btn" id="btn-density" onclick="toggleDensity()">Density</button>
  </div>
  <div id="legend" class="hud">
    <div class="legend-title">Vessel class</div>
    <div class="legend-row"><span class="swatch" style="background:#ff5fa2;"></span> LNG carrier</div>
    <div class="legend-row"><span class="swatch sq" style="background:#e74c3c;"></span> FSRU</div>
    <div class="legend-title">Watchlist tier (ring)</div>
    <div class="tier-scale">
      <span class="tier-1">1</span><span class="tier-2">2</span><span class="tier-3">3</span><span class="tier-4">4</span><span class="tier-5">5</span>
    </div>
    <div class="fade-labels"><span>at terminal</span><span>stale</span></div>
    <div class="legend-title">Fix freshness</div>
    <div class="fade-bar"></div>
    <div class="fade-labels"><span>just seen</span><span>&gt;24h</span></div>
  </div>
  <div id="status" class="hud">Loading…</div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([25, -30], 3);
    // Dark basemap (CARTO dark_all) — keeps land detail muted so the colored
    // vessel/tier markers and the plasma density layer read clearly. {r}
    // serves @2x tiles on retina; no API key required.
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 19,
    }).addTo(map);

    const vesselLayer  = L.layerGroup().addTo(map);
    const zonesLayer   = L.layerGroup().addTo(map);
    const boxesLayer   = L.layerGroup().addTo(map);
    let trackLayer = null;
    let eventMarkersLayer = null;
    const markers = {};

    const layers = { vessels: vesselLayer, zones: zonesLayer, boxes: boxesLayer };
    let densityLayer = null;

    // Vessel class → fill color. Only LNG carriers and FSRUs reach the map now,
    // so there is no crude-tanker / unknown fill any more.
    const FSRU_COLOR = '#e74c3c';
    const CARRIER_COLOR = '#ff5fa2';

    // priority_watchlist tier → marker stroke color. Tier 1 (in a terminal zone)
    // is hottest, tier 5 (stale) coldest; null = not on the watchlist.
    const TIER_COLORS = { 1: '#2ecc71', 2: '#f1c40f', 3: '#e67e22', 4: '#95a5a6', 5: '#566573' };
    function tierColor(tier) { return TIER_COLORS[tier] || '#34495e'; }

    // priority_watchlist tier → marker radius (px). Tier 1 (at a terminal) reads
    // largest so "what matters now" carries the most visual weight; stale tiers
    // shrink. null (off-watchlist) sits at the neutral middle.
    const TIER_RADIUS = { 1: 8, 2: 7, 3: 6, 4: 5, 5: 4 };
    function tierRadius(tier) { return TIER_RADIUS[tier] || 5.5; }

    // Fix freshness → fill opacity. Just-seen vessels burn bright; the longer
    // since their last fix, the more they fade, so silent vessels recede.
    function freshnessOpacity(fixTs) {
      const ageMin = (Date.now() - new Date(fixTs).getTime()) / 60000;
      if (ageMin < 30)   return 0.95;
      if (ageMin < 120)  return 0.70;
      if (ageMin < 360)  return 0.45;
      if (ageMin < 1440) return 0.28;
      return 0.16;
    }
    function fmtAge(ts) {
      const s = (Date.now() - new Date(ts).getTime()) / 1000;
      if (s < 90) return Math.max(0, Math.round(s)) + 's ago';
      const m = s / 60; if (m < 90) return Math.round(m) + 'm ago';
      const h = m / 60; if (h < 48) return Math.round(h) + 'h ago';
      return Math.round(h / 24) + 'd ago';
    }

    // Color (and CSS class suffix) per event_type. Stays in sync with the
    // .et-* CSS classes above.
    const EVENT_COLORS = {
      zone_entry:      '#27ae60',
      anchorage_entry: '#2980b9',
      anchored:        '#1a5490',
      anchorage_exit:  '#5dade2',
      moored:          '#e67e22',
      departed:        '#d35400',
      zone_exit:       '#c0392b',
    };

    function toggleLayer(name) {
      const btn = document.getElementById('btn-' + name);
      const layer = layers[name];
      if (map.hasLayer(layer)) { map.removeLayer(layer); btn.classList.remove('active'); }
      else { map.addLayer(layer); btn.classList.add('active'); }
    }

    async function loadDensity() {
      if (densityLayer) { map.removeLayer(densityLayer); densityLayer = null; }
      setStatus('Rendering shipping lanes — first tiles take a few seconds, cached after…');
      const b = await fetch('/api/density-bounds').then(r => r.json());
      // Tile layer: each 256² tile is rendered server-side at the viewed zoom,
      // so lanes stay crisp at any zoom instead of upscaling one fixed PNG.
      // ?v= busts the browser cache when the underlying data is refreshed.
      densityLayer = L.tileLayer(`/api/density-tiles/{z}/{x}/{y}.png?v=${Date.now()}`, {
        opacity: 0.85,
        bounds: [[b.south, b.west], [b.north, b.east]],
        minZoom: 2,
        maxNativeZoom: 15,
        maxZoom: 18,
        zIndex: 350,
      }).addTo(map);
      densityLayer.on('load', () => {
        setStatus(`${Object.keys(markers).length} vessels — click any vessel or event to inspect`);
      });
    }

    function toggleDensity() {
      const btn = document.getElementById('btn-density');
      if (densityLayer) {
        map.removeLayer(densityLayer);
        densityLayer = null;
        btn.classList.remove('active');
      } else {
        btn.classList.add('active');
        loadDensity();
      }
    }

    function setStatus(msg) { document.getElementById('status').textContent = msg; }
    function fmtTimeShort(iso) {
      const d = new Date(iso);
      return d.toISOString().slice(5, 16).replace('T', ' ');
    }
    function fmtTimeFull(iso) { return new Date(iso).toUTCString().replace(' GMT', ' UTC'); }

    // ----------------------------------------------------------------
    // Vessel display
    // ----------------------------------------------------------------

    async function loadVessels() {
      setStatus('Fetching vessels…');
      const vessels = await fetch('/api/vessels').then(r => r.json());
      vessels.forEach(v => {
        const color = v.is_fsru ? FSRU_COLOR : CARRIER_COLOR;
        const stroke = tierColor(v.tier);
        const fresh = freshnessOpacity(v.fix_ts);
        const r = tierRadius(v.tier);
        let marker;
        if (v.is_fsru) {
          // FSRUs are stationary hosts — draw a square, sized by tier like the
          // circles. Tier rings the box; freshness fades the whole marker.
          const box = Math.round(r * 1.9);
          const icon = L.divIcon({
            className: 'fsru-icon',
            html: `<div style="width:${box}px;height:${box}px;background:${color};border:2px solid ${stroke};"></div>`,
            iconSize: [box, box], iconAnchor: [box / 2, box / 2],
          });
          marker = L.marker([v.lat, v.lon], { icon, opacity: fresh });
        } else {
          marker = L.circleMarker([v.lat, v.lon], {
            radius: r, color: stroke, fillColor: color,
            fillOpacity: fresh, opacity: Math.max(0.5, fresh), weight: 2,
            bubblingMouseEvents: false,
          });
        }
        // Remember the freshness baseline so dim/undim restores to it rather
        // than a flat constant — keeps the staleness fade intact after a track.
        marker._fresh = fresh;
        const name = v.vessel_name || `MMSI ${v.mmsi}`;
        const sog = v.sog != null ? v.sog.toFixed(1) + ' kn' : '?';
        // Draught line: "Draught: cur / design m" with laden/ballast hint.
        // Threshold is 0.85 × design — flagged in the colour of the value.
        let draughtLine = '';
        if (v.current_draught != null || v.design_draught != null) {
          const cur = v.current_draught != null ? v.current_draught.toFixed(1) : '?';
          const dsn = v.design_draught != null ? v.design_draught.toFixed(1) : '?';
          let hint = '';
          if (v.current_draught != null && v.design_draught != null) {
            const ratio = v.current_draught / v.design_draught;
            const laden = ratio >= 0.85;
            hint = ` <span style="color:${laden ? '#16a085' : '#7f8c8d'};font-weight:600;">(${laden ? 'laden' : 'ballast'})</span>`;
          }
          draughtLine = `<br>Draught: ${cur} / ${dsn} m${hint}`;
        }
        // Tier line: "Tier N · reason · slot" so it's clear why we watch this
        // vessel and whether it currently holds a subscription slot.
        let tierLine = '';
        if (v.tier != null) {
          const slot = v.in_slot ? ` · <span style="color:#2ecc71;">${v.slot_kind || 'slot'}</span>` : '';
          const reason = v.score_reason ? ` · ${v.score_reason}` : '';
          tierLine = `<br><span style="color:${tierColor(v.tier)};font-weight:600;">Tier ${v.tier}</span>${reason}${slot}`;
        }
        marker.bindPopup(
          `<b>${name}</b><br>MMSI: ${v.mmsi}`
          + (v.imo ? `<br>IMO: ${v.imo}` : '')
          + `<br>Class: ${v.is_fsru ? 'FSRU' : 'LNG carrier'}`
          + (v.vf_vessel_type ? ` (${v.vf_vessel_type})` : '')
          + (v.flag ? `<br>Flag: ${v.flag}` : '')
          + `<br>SOG: ${sog}`
          + draughtLine
          + tierLine
          + `<br>Last fix: ${fmtAge(v.fix_ts)} · ${fmtTimeFull(v.fix_ts)}`
        );
        marker.on('click', () => selectVessel(v.mmsi, name));
        marker.addTo(vesselLayer);
        markers[v.mmsi] = marker;
      });
      setStatus(`${vessels.length} LNG vessels — click any vessel or event to inspect`);
    }

    async function selectVessel(mmsi, name) {
      setStatus(`Loading track for ${name} (${mmsi})…`);
      dimAllExcept(mmsi);
      clearTrackAndEvents();
      const history = await fetch(`/api/vessel/${mmsi}/history`).then(r => r.json());
      if (!history.length) { setStatus('No history found'); return; }
      drawTrack(history);
      map.fitBounds(L.latLngBounds(history.map(h => [h.lat, h.lon])).pad(0.2));
      document.getElementById('reset-btn').style.display = 'block';
      setStatus(`${name} — last ${history.length} fixes`);
    }

    function dimAllExcept(mmsi) {
      Object.entries(markers).forEach(([m, mk]) => {
        const active = String(m) === String(mmsi);
        if (mk.setStyle) mk.setStyle({ opacity: active ? 1 : 0.12, fillOpacity: active ? 0.95 : 0.12 });
        else mk.setOpacity(active ? 1 : 0.12);
      });
    }
    function undim() {
      // Restore each marker to its freshness baseline, not a flat constant, so
      // the staleness fade survives selecting/deselecting a vessel.
      Object.values(markers).forEach(mk => {
        const fresh = mk._fresh ?? 0.85;
        if (mk.setStyle) mk.setStyle({ opacity: Math.max(0.5, fresh), fillOpacity: fresh });
        else mk.setOpacity(fresh);
      });
    }

    function clearTrackAndEvents() {
      if (trackLayer)        { map.removeLayer(trackLayer);        trackLayer = null; }
      if (eventMarkersLayer) { map.removeLayer(eventMarkersLayer); eventMarkersLayer = null; }
    }

    function drawTrack(fixes) {
      // `fixes` is expected in chronological order. /api/vessel/{mmsi}/history
      // returns newest-first; we sort in case.
      const sorted = fixes.slice().sort((a, b) => new Date(a.fix_ts) - new Date(b.fix_ts));
      const coords = sorted.map(h => [h.lat, h.lon]);
      trackLayer = L.layerGroup();
      L.polyline(coords, { color: '#3498db', weight: 2, opacity: 0.8, bubblingMouseEvents: false }).addTo(trackLayer);
      sorted.forEach((h, i) => {
        const isNewest = i === sorted.length - 1;
        L.circleMarker([h.lat, h.lon], {
          radius: isNewest ? 5 : 2,
          color: isNewest ? '#2ecc71' : '#3498db',
          fillColor: isNewest ? '#2ecc71' : '#3498db',
          fillOpacity: 0.7, weight: 1, bubblingMouseEvents: false,
        }).addTo(trackLayer);
      });
      trackLayer.addTo(map);
    }

    map.on('click', () => { if (trackLayer) resetView(); });

    function resetView() {
      undim();
      clearTrackAndEvents();
      document.getElementById('reset-btn').style.display = 'none';
      document.querySelectorAll('.event-row.selected').forEach(r => r.classList.remove('selected'));
      setStatus(`${Object.keys(markers).length} vessels — click any vessel or event to inspect`);
    }

    // ----------------------------------------------------------------
    // Terminal zones + AIS boxes
    // ----------------------------------------------------------------

    async function loadTerminalZones() {
      const geojson = await fetch('/api/terminal-zones').then(r => r.json());
      L.geoJSON(geojson, {
        style: f => {
          if (f.properties.zone_type === 'berth') {
            return { color: '#e67e22', fillColor: '#e67e22', fillOpacity: 0.25, weight: 1.5 };
          }
          if (f.properties.zone_type === 'approach') {
            return { color: '#16a085', fillColor: '#16a085', fillOpacity: 0.08, weight: 1, dashArray: '8 4' };
          }
          return { color: '#3498db', fillColor: '#3498db', fillOpacity: 0.12, weight: 1, dashArray: '4 3' };
        },
        onEachFeature: (f, layer) => {
          const p = f.properties;
          const label = p.sub_zone > 0 ? ` (${p.zone_type} ${p.sub_zone})` : ` (${p.zone_type})`;
          layer.bindTooltip(p.terminal_name + label, { sticky: true });
        },
      }).addTo(zonesLayer);
    }

    async function loadBoundingBoxes() {
      const geojson = await fetch('/api/bounding-boxes').then(r => r.json());
      L.geoJSON(geojson, { style: { color: '#95a5a6', fillOpacity: 0, weight: 1, dashArray: '6 4' } }).addTo(boxesLayer);
    }

    // ----------------------------------------------------------------
    // Events panel
    // ----------------------------------------------------------------

    let lastEvents = [];

    function eventQueryString() {
      const params = new URLSearchParams();
      const z = document.getElementById('filter-zone').value;
      const e = document.getElementById('filter-event-type').value;
      const s = document.getElementById('filter-since').value;
      if (z) params.set('zone', z);
      if (e) params.set('event_type', e);
      if (s) params.set('since_hours', s);
      params.set('limit', '200');
      return params.toString();
    }

    async function loadEvents() {
      const list = document.getElementById('events-list');
      list.innerHTML = 'Loading…';
      const events = await fetch('/api/port-events?' + eventQueryString()).then(r => r.json());
      lastEvents = events;
      document.getElementById('events-count').textContent = `${events.length}`;
      list.innerHTML = '';
      if (!events.length) { list.textContent = 'No matching events.'; return; }
      events.forEach(ev => {
        const row = document.createElement('div');
        row.className = 'event-row';
        row.dataset.id = ev.id;
        const name = (ev.vessel_name || '').trim() || `MMSI ${ev.mmsi}`;
        const terminal = ev.terminal_name || `terminal ${ev.terminal_id ?? '?'}`;
        const badges = [];
        if (ev.cold_start) badges.push('<span class="badge badge-cold">cold</span>');
        if (ev.is_fsru) badges.push('<span class="badge badge-fsru">FSRU</span>');
        if (ev.laden_flag === true) badges.push('<span class="badge badge-laden">laden</span>');
        else if (ev.laden_flag === false) badges.push('<span class="badge badge-ballast">ballast</span>');
        row.innerHTML = `
          <div class="event-row-top">
            <span class="event-vessel">${name}</span>
            <span class="event-time">${fmtTimeShort(ev.event_time)}</span>
          </div>
          <div class="event-row-bottom">
            <span class="event-pill et-${ev.event_type}">${ev.event_type}</span>
            <span class="event-terminal">${terminal} · ${ev.zone}</span>
            ${badges.join('')}
          </div>
        `;
        row.addEventListener('click', () => selectEvent(ev, row));
        list.appendChild(row);
      });
    }

    async function selectEvent(ev, row) {
      document.querySelectorAll('.event-row.selected').forEach(r => r.classList.remove('selected'));
      row.classList.add('selected');
      const name = (ev.vessel_name || '').trim() || `MMSI ${ev.mmsi}`;
      setStatus(`Loading ${name} around ${ev.event_type}…`);
      dimAllExcept(ev.mmsi);
      clearTrackAndEvents();

      const tsEnc = encodeURIComponent(ev.event_time);
      const [track, siblings] = await Promise.all([
        fetch(`/api/vessel/${ev.mmsi}/track-around?ts=${tsEnc}&hours=6`).then(r => r.json()),
        fetch(`/api/vessel/${ev.mmsi}/events?ts=${tsEnc}&hours=6`).then(r => r.json()),
      ]);

      if (track.length) drawTrack(track);

      // Draw event markers along the track; the clicked event is highlighted.
      eventMarkersLayer = L.layerGroup();
      siblings.forEach(s => {
        const isClicked = s.event_type === ev.event_type
          && new Date(s.event_time).getTime() === new Date(ev.event_time).getTime();
        const color = EVENT_COLORS[s.event_type] || '#bdc3c7';
        L.circleMarker([s.lat, s.lon], {
          radius: isClicked ? 9 : 6,
          color: isClicked ? '#ffffff' : color,
          fillColor: color,
          fillOpacity: 0.95,
          weight: isClicked ? 2.5 : 1.5,
          bubblingMouseEvents: false,
        }).bindTooltip(
          `<b>${s.event_type}</b><br>${s.terminal_name || ''} (${s.zone})<br>${fmtTimeFull(s.event_time)}`,
          { sticky: true }
        ).addTo(eventMarkersLayer);
      });
      eventMarkersLayer.addTo(map);

      // Fit bounds to the union of track + event positions
      const allCoords = track.map(t => [t.lat, t.lon]).concat(siblings.map(s => [s.lat, s.lon]));
      if (allCoords.length) {
        map.fitBounds(L.latLngBounds(allCoords).pad(0.25));
      } else {
        map.setView([ev.lat, ev.lon], 11);
      }
      document.getElementById('reset-btn').style.display = 'block';
      setStatus(`${name} · ${ev.event_type} at ${ev.terminal_name || ev.zone} · ${siblings.length} events / ${track.length} fixes in ±6h`);
    }

    ['filter-zone', 'filter-event-type', 'filter-since'].forEach(id => {
      document.getElementById(id).addEventListener('change', loadEvents);
    });

    // ----------------------------------------------------------------
    // Recent fixes feed
    // ----------------------------------------------------------------

    let activeTab = 'events';
    let fixesTimer = null;

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-events').classList.toggle('active', tab === 'events');
      document.getElementById('tab-fixes').classList.toggle('active', tab === 'fixes');
      document.getElementById('events-view').style.display = tab === 'events' ? 'flex' : 'none';
      document.getElementById('fixes-view').style.display  = tab === 'fixes'  ? 'flex' : 'none';
      if (tab === 'fixes') loadFixes();
    }

    function classChip(f) {
      if (f.is_fsru) return '<span class="chip chip-fsru">FSRU</span>';
      if (f.is_lng_carrier) return '<span class="chip chip-carrier">LNG</span>';
      return '<span class="chip chip-unknown">?</span>';
    }

    async function loadFixes() {
      const list = document.getElementById('fixes-list');
      const since = document.getElementById('filter-fixes-since').value;
      const fixes = await fetch(`/api/recent-fixes?since_hours=${since}&limit=200`).then(r => r.json());
      document.getElementById('fixes-count').textContent = `${fixes.length}`;
      list.innerHTML = '';
      if (!fixes.length) { list.textContent = 'No fixes in this window.'; return; }
      fixes.forEach(f => {
        const ageMin = (Date.now() - new Date(f.fix_ts).getTime()) / 60000;
        const row = document.createElement('div');
        row.className = 'fix-row' + (ageMin < 5 ? ' fresh' : '');
        const name = (f.vessel_name || '').trim() || `MMSI ${f.mmsi}`;
        const tier = f.tier != null ? `<span class="tier tier-${f.tier}">T${f.tier}</span>` : '';
        const sog = f.sog != null ? `${f.sog.toFixed(1)} kn` : '? kn';
        const pos = `${f.lat.toFixed(2)}, ${f.lon.toFixed(2)}`;
        row.innerHTML = `
          <div class="fix-row-top">
            <span class="fix-vessel">${name}</span>
            <span class="fix-age">${fmtAge(f.fix_ts)}</span>
          </div>
          <div class="fix-row-bottom">
            ${classChip(f)} ${tier}
            <span>${sog} · ${pos}</span>
          </div>
        `;
        row.title = `${fmtTimeFull(f.fix_ts)} · src ${f.source ?? '?'}`;
        row.addEventListener('click', () => selectVessel(f.mmsi, name));
        list.appendChild(row);
      });
    }

    document.getElementById('filter-fixes-since').addEventListener('change', loadFixes);
    document.getElementById('fixes-autorefresh').addEventListener('change', e => {
      if (e.target.checked && activeTab === 'fixes') loadFixes();
    });
    // Refresh the feed every 15 s while the tab is open and auto-refresh is on.
    fixesTimer = setInterval(() => {
      if (activeTab === 'fixes' && document.getElementById('fixes-autorefresh').checked) loadFixes();
    }, 15000);

    // ----------------------------------------------------------------
    // Live ingestion pulse (top-center HUD)
    // ----------------------------------------------------------------

    async function loadIngestStatus() {
      try {
        const s = await fetch('/api/ingest-status').then(r => r.json());
        const dot = document.getElementById('live-dot');
        const txt = document.getElementById('live-text');
        const age = s.last_bucket_age_s;
        if (age == null) {
          dot.className = 'stale';
          txt.textContent = 'no ingest (15m+)';
        } else if (age < 180) {
          dot.className = 'live';
          txt.textContent = `live · ${s.fix_rate_per_min.toLocaleString()} fixes/min`;
        } else {
          dot.className = 'stale';
          txt.textContent = `stale · ${Math.round(age / 60)}m since last fix`;
        }
      } catch (e) { /* transient — keep the last shown state */ }
    }
    loadIngestStatus();
    setInterval(loadIngestStatus, 10000);

    loadVessels();
    loadTerminalZones();
    loadBoundingBoxes();
    loadEvents();
  </script>
</body>
</html>
