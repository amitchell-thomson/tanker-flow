<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tanker Flow</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Condensed:wght@500;600;700&display=swap">
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="/static/css/signals.css">
</head>
<body data-view="map">
  <!-- ── Shared top bar: wordmark · view nav · provenance chip · live pulse ── -->
  <header id="topbar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 32 18" fill="none" aria-hidden="true">
        <path d="M2 11.2 H29 L26 16 H5 Z" fill="currentColor"/>
        <circle cx="8.5" cy="8" r="2.8" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="15.5" cy="8" r="2.8" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="22.5" cy="8" r="2.8" stroke="currentColor" stroke-width="1.5"/>
      </svg>Tanker&nbsp;Flow</div>
    <nav id="view-nav">
      <button class="nav-btn active" data-view="map">Map</button>
      <button class="nav-btn" data-view="signals">Signals</button>
    </nav>
    <div id="live-hud"><span id="live-dot"></span><span id="live-text">…</span></div>
  </header>

  <div id="views">
    <!-- ── Map view ── -->
    <section id="view-map" class="view">
      <!-- ── Docked map toolbar (flush, not floating) ── -->
      <div id="map-toolbar">
        <select id="basemap-select" title="Basemap">
          <option value="dark">Dark (CARTO)</option>
          <option value="darknolabels">Dark · no labels</option>
          <option value="darkgray">Dark gray (Esri)</option>
          <option value="ocean">Ocean</option>
          <option value="satellite">Satellite</option>
          <option value="voyager">Voyager (light)</option>
        </select>
        <div class="toolbar-sep"></div>
        <div class="toolbar-layers">
          <button class="layer-btn active" id="btn-zones">Zones</button>
          <button class="layer-btn active" id="btn-boxes">AIS boxes</button>
          <button class="layer-btn active" id="btn-vessels">Vessels</button>
          <button class="layer-btn" id="btn-density">Density</button>
        </div>
        <span id="status">Loading…</span>
        <button id="reset-btn">Show all vessels</button>
      </div>
      <div id="layout">
        <div id="map"></div>
        <div id="events-panel">
          <div id="panel-head">
            <span id="panel-title">Live feed</span>
            <span id="panel-sub"></span>
            <button id="panel-collapse" title="Hide panel" aria-label="Hide panel">⟩</button>
          </div>
          <div id="panel-tabs">
            <button class="tab-btn active" id="tab-events">Port events</button>
            <button class="tab-btn"        id="tab-fixes">Recent fixes</button>
          </div>

          <div id="events-view" class="panel-view">
            <div id="events-filters">
              <select id="filter-zone">
                <option value="">All zones</option>
                <option value="usgulf">usgulf</option>
                <option value="usatlantic">usatlantic</option>
                <option value="nweurope">nweurope</option>
                <option value="baltic">baltic</option>
                <option value="iberian">iberian</option>
                <option value="wmed">wmed</option>
                <option value="emed">emed</option>
              </select>
              <select id="filter-event-type">
                <option value="">All types</option>
                <option value="zone_entry">zone_entry</option>
                <option value="anchorage_entry">anchorage_entry</option>
                <option value="anchored">anchored</option>
                <option value="anchorage_exit">anchorage_exit</option>
                <option value="moored">moored</option>
                <option value="departed">departed</option>
                <option value="zone_exit">zone_exit</option>
              </select>
              <select id="filter-since">
                <option value="">All time</option>
                <option value="6">last 6h</option>
                <option value="24" selected>last 24h</option>
                <option value="168">last 7d</option>
              </select>
              <span id="events-count">…</span>
            </div>
            <div id="events-list">Loading…</div>
          </div>

          <div id="fixes-view" class="panel-view" style="display:none;">
            <div id="fixes-filters">
              <select id="filter-fixes-since">
                <option value="0.25">last 15m</option>
                <option value="1" selected>last 1h</option>
                <option value="6">last 6h</option>
                <option value="24">last 24h</option>
              </select>
              <label><input type="checkbox" id="fixes-autorefresh" checked> auto-refresh</label>
              <span id="fixes-count">…</span>
            </div>
            <div id="fixes-list">Loading…</div>
          </div>
        </div>
      </div>

      <aside id="inspector" hidden></aside>
      <button id="panel-reopen" class="hud" hidden title="Show panel">⟨&nbsp;Feed</button>
      <div id="playback-bar" class="hud" hidden>
        <button id="pb-play" title="Play / pause (space)">▶</button>
        <input id="pb-slider" type="range" min="0" max="1000" value="0" step="1" title="Scrub">
        <span id="pb-time">—</span>
        <button id="pb-speed" title="Playback speed">1×</button>
        <button id="pb-close" title="Close playback" aria-label="Close">✕</button>
      </div>
    </section>

    <!-- ── Signals view ── -->
    <section id="view-signals" class="view">
      <div id="signals-subhead">
        <span class="subhead-title">Market signals</span>
        <div id="signal-controls">
          <label class="ctl-sel" title="How much history to load — a shorter window loads far faster">range
            <select id="signal-range">
              <option value="90">90d</option>
              <option value="365" selected>1y</option>
              <option value="1825">5y</option>
              <option value="0">all</option>
            </select>
          </label>
          <label class="ctl-toggle" title="Show only the four headline gas-volume signals"><input type="checkbox" id="headline-only"> headline only</label>
          <label class="ctl-sel" title="physical = hindsight (validation); knowable = leakage-safe point-in-time (the model input)">basis
            <select id="basis-select">
              <option value="physical">physical</option>
              <option value="knowable">knowable</option>
            </select>
          </label>
          <label id="regime-toggle" title="Show the live (mmsi_filter) regime alone instead of the pooled series"><input type="checkbox" id="split-regime"> split by regime</label>
        </div>
        <span id="signals-status">Loading…</span>
      </div>
      <div id="status-strip">
        <div class="stat"><span class="stat-label">signals rebuilt</span><span class="stat-val" id="st-rebuilt">—</span></div>
        <div class="stat"><span class="stat-label">panel</span><span class="stat-val" id="st-panel">—</span></div>
        <div class="stat"><span class="stat-label">legs in transit</span><span class="stat-val" id="st-transit">—</span></div>
        <div class="stat"><span class="stat-label">overdue, no arrival</span><span class="stat-val" id="st-overdue">—</span></div>
        <div class="stat"><span class="stat-label">unknown dest</span><span class="stat-val" id="st-fallback">—</span></div>
        <div class="stat"><span class="stat-label">in berth now</span><span class="stat-val" id="st-berth">—</span></div>
        <div class="stat"><span class="stat-label">regime now</span><span class="stat-val" id="st-regime">—</span></div>
        <div class="stat"><span class="stat-label">port events rebuilt</span><span class="stat-val" id="st-pe">—</span></div>
      </div>
      <div id="headline-ribbon"></div>
      <nav id="family-rail"></nav>
      <main id="signal-sections"></main>
    </section>
  </div>

  <!-- ── Phone bottom tab bar (hidden on desktop; mirrors #view-nav) ── -->
  <nav id="tabbar">
    <button class="tabbar-btn active" data-view="map">
      <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14.106 5.553a2 2 0 0 0 1.788 0l3.659-1.83A1 1 0 0 1 21 4.619v12.764a1 1 0 0 1-.553.894l-4.553 2.277a2 2 0 0 1-1.788 0l-4.212-2.106a2 2 0 0 0-1.788 0l-3.659 1.83A1 1 0 0 1 3 19.381V6.618a1 1 0 0 1 .553-.894l4.553-2.277a2 2 0 0 1 1.788 0z"/><path d="M15 5.764v15"/><path d="M9 3.236v15"/></svg>
      <span class="tab-lbl">Map</span>
    </button>
    <button class="tabbar-btn" data-view="signals">
      <svg class="tab-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      <span class="tab-lbl">Signals</span>
    </button>
  </nav>

  <!-- Contributor drawer (signals view) -->
  <div id="drawer-scrim"></div>
  <aside id="contrib-drawer">
    <div class="drawer-head">
      <div>
        <div class="drawer-title" id="drawer-title">—</div>
        <div class="drawer-sub" id="drawer-sub"></div>
      </div>
      <button id="drawer-close" title="Close">&times;</button>
    </div>
    <div id="drawer-actions"></div>
    <div id="drawer-body"></div>
  </aside>

  <!-- Fullscreen chart modal (click a signal chart / its ⤢ button) -->
  <div id="chart-modal" hidden>
    <div class="cm-head">
      <div>
        <div id="cm-title">—</div>
        <div id="cm-sub"></div>
      </div>
      <button id="cm-close" title="Close (Esc)" aria-label="Close">&times;</button>
    </div>
    <div class="cm-body"><canvas id="cm-canvas"></canvas></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
